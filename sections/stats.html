<section class="stats-section" id="stats">
    <div class="stats-bg-img-wrapper"><img src="img/statsgame.webp" alt="Gaming stats background" class="stats-bg-img" loading="lazy" width="1920" height="600"></div>
    <div class="stats-overlay"></div>
    <div class="section-container stats-content">
        <span class="section-tag center anim-fade-in">// By the Numbers</span>
        <h2 class="section-title center anim-fade-up">Stackly <span class="text-gradient">in Stats</span></h2>
        <div class="stats-grid">
            <div class="stat-card anim-scale-up delay-100"><div class="stat-icon-wrap"><i class="fas fa-users"></i></div><div class="stat-value"><span class="stat-number" data-target="12">0</span><span class="stat-suffix">M+</span></div><p class="stat-label">Registered Players</p></div>
            <div class="stat-card anim-scale-up delay-200"><div class="stat-icon-wrap"><i class="fas fa-bolt"></i></div><div class="stat-value"><span class="stat-number" data-target="500">0</span><span class="stat-suffix">K+</span></div><p class="stat-label">Daily Active Users</p></div>
            <div class="stat-card anim-scale-up delay-300"><div class="stat-icon-wrap"><i class="fas fa-gamepad"></i></div><div class="stat-value"><span class="stat-number" data-target="50">0</span><span class="stat-suffix">+</span></div><p class="stat-label">Games Published</p></div>
            <div class="stat-card anim-scale-up delay-400"><div class="stat-icon-wrap"><i class="fas fa-shield-alt"></i></div><div class="stat-value"><span class="stat-number" data-target="99">0</span><span class="stat-suffix">.9%</span></div><p class="stat-label">Server Uptime</p></div>
        </div>
    </div>
</section>
